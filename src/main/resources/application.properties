# Application
spring.application.name=reviewflow-backend
spring.profiles.active=local

# Database - use .env file for actual credentials (gitignored)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# Server
server.port=8081

# JWT (use env variables)
jwt.secret=${JWT_SECRET}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS}

# CORS (comma-separated origins; use env in production)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}

# Cookie (Secure in production)
app.cookie.secure=${COOKIE_SECURE:false}
